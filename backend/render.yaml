services:
  - type: web
    name: chaos-to-sprint-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: FRONTEND_ORIGIN
        value: http://localhost:5173
      - key: OPENAI_API_KEY
        sync: false
